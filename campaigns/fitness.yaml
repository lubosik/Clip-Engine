name: fitness
enabled: true

sources:
  # HARD RULE: real people on podcasts/interviews ONLY — never animated
  # explainers. Search terms target podcast footage; the exclude lists and
  # the design-gate vision check enforce it.
  youtube:
    search_terms:
      - "hypertrophy podcast interview"
      - "muscle growth podcast clip"
      - "fitness coach interview training"
      - "strength training podcast huberman"
    channels: []            # optional explicit channel URLs
    exclude_channels:
      - "TED-Ed"
      - "TED"
      - "Kurzgesagt"
      - "AsapSCIENCE"
      - "Institute of Human Anatomy"
    min_view_count: 20000
    uploaded_within: "year" # hour|day|week|month|year
  exclude_keywords:
    - "animation"
    - "animated"
    - "explained in 5 levels"
    - "cartoon"
  tiktok:
    profiles: []
    hashtags: ["fitnesspodcast", "hypertrophy"]
  instagram:
    profiles: []

ranking:
  clip_length: [20, 60]     # seconds, min/max
  max_clips_per_source: 8
  exhaust_source: false
  min_score: 0.6
  ranking_rules: |
    Prefer moments that are genuinely useful or interesting on their own:
    a clear explanation of a mechanism, a specific actionable tip, a
    surprising-but-true fact, a vivid story, a strong opinion with reasoning.
    Each clip must stand alone with a hook in the first 2 seconds.
    EXCLUDE: unsafe or extreme advice, dangerous dieting/cutting, anything
    promoting disordered eating, medical claims presented as fact, and
    anything that would violate TikTok/Instagram community guidelines.
    When in doubt, skip it.

# Layout is the style_refs contract (IMG_7493/7494): white hook box mid-frame
# gone by ~8s, CapCut captions just below it, the uploaded logo readable at the
# bottom for the whole clip.
template:
  aspect: "9:16"
  resolution: [1080, 1920]
  captions:
    style: "word_by_word"   # CapCut-style, active word highlighted
    font: "assets/fitness/Montserrat-ExtraBold.ttf"
    base_color: "#FFFFFF"
    highlight_color: "#00E5FF"
    outline_color: "#000000"
    outline_px: 6
    position: "mid_low"     # caption zone just below the hook box
    max_words_per_line: 3   # short CapCut-style chunks
  hook:
    enabled: true
    show_seconds: [0, 8]    # visible first ~8s, then gone
    source: "ranking"
    font: "assets/fitness/Montserrat-ExtraBold.ttf"
    box_color: "#FFFFFF"    # white rounded box…
    text_color: "#000000"   # …with bold black text (style refs)
  lower_third:
    show_source_handle: true
    format: "via @{source_handle}"
  watermark:
    # The operator's uploaded "Vici Logo for Clipping" — bottom, readable,
    # on screen for the entire clip. Never a faint centered ghost.
    image: "assets/fitness/logo.png"
    position: "bottom"
    opacity: 0.9
    scale: 0.3
  corner_badge:
    image: null             # style refs have no corner badge
  outro:
    enabled: true
    clip: "assets/fitness/outro.mov"  # the uploaded "Vici Clipping Video CTA" (7.0s)
    audio: "keep"           # keep|mute

destinations:
  postiz_channels: ["instagram-standalone", "x"]  # Postiz identifiers; add "tiktok" once connected in Postiz
  schedule:
    posts_per_day: 1
    times: ["17:00"]
    timezone: "America/New_York"
  caption_template: |
    {hook}

    via @{source_handle}
    {hashtags}
  hashtags: ["#fitness", "#hypertrophy", "#protein", "#gymtok"]
  autopost: false           # false = draft only, human approves in Postiz too

analytics:
  track: true
  pull_day: "monday"
